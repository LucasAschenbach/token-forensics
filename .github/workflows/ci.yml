name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Smoke test
        run: |
          CODEX_HOME="${RUNNER_TEMP}/empty-codex" PYTHONPATH=src python -m token_forensics list
          CODEX_HOME="${RUNNER_TEMP}/empty-codex" PYTHONPATH=src python -m token_forensics stats

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel and source distribution
        run: uv build
